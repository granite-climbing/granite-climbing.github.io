<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>베타영상 관리 - Granite Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header a {
      color: #aaa;
      text-decoration: none;
      font-size: 13px;
    }
    .header a:hover { color: #fff; }
    .header-spacer { flex: 1; }
    .logout-btn {
      background: none;
      border: 1px solid #555;
      color: #ccc;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .logout-btn:hover { background: #333; }

    /* Setup screen */
    .setup-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 60px);
      padding: 24px;
    }
    .setup-card {
      background: #fff;
      border-radius: 8px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .setup-card h2 { font-size: 20px; margin-bottom: 8px; }
    .setup-card p { color: #666; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #4a6cf7; }
    .btn-primary {
      width: 100%;
      padding: 11px;
      background: #4a6cf7;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #3a5ce0; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
    .error-msg { color: #e53e3e; font-size: 13px; margin-top: 12px; }
    .info-box {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 6px;
      padding: 12px;
      font-size: 13px;
      color: #1e40af;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* Main screen */
    .main-screen { padding: 24px; }
    .top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .top-bar h2 { font-size: 20px; font-weight: 600; }
    .badge {
      background: #e2e8f0;
      color: #475569;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 13px;
    }

    /* Filters */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      padding: 6px 14px;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #4a6cf7; color: #4a6cf7; }
    .filter-btn.active {
      background: #4a6cf7;
      color: #fff;
      border-color: #4a6cf7;
    }
    .search-input {
      padding: 6px 12px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 13px;
      outline: none;
      width: 200px;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: #4a6cf7; }
    .filter-spacer { flex: 1; }
    .toggle-deleted {
      font-size: 13px;
      color: #666;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Table */
    .table-wrapper {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    thead { background: #f8fafc; }
    th {
      text-align: left;
      padding: 12px 16px;
      font-weight: 600;
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #e2e8f0;
    }
    td { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }
    tr.deleted td { opacity: 0.45; }

    .thumbnail-cell { width: 72px; }
    .thumbnail {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
      background: #e2e8f0;
      display: block;
    }
    .thumbnail-placeholder {
      width: 60px;
      height: 60px;
      border-radius: 6px;
      background: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .platform-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    .platform-instagram { background: #fce7f3; color: #9d174d; }
    .platform-youtube   { background: #fee2e2; color: #991b1b; }
    .platform-tiktok    { background: #f0fdf4; color: #166534; }
    .platform-other     { background: #f1f5f9; color: #475569; }

    .video-link {
      color: #4a6cf7;
      text-decoration: none;
      word-break: break-all;
      font-size: 13px;
    }
    .video-link:hover { text-decoration: underline; }

    .problem-slug {
      font-family: monospace;
      font-size: 12px;
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
      color: #475569;
    }

    .date-cell { white-space: nowrap; font-size: 12px; color: #64748b; }

    .delete-btn {
      padding: 5px 10px;
      background: none;
      border: 1px solid #fca5a5;
      color: #ef4444;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .delete-btn:hover { background: #fee2e2; }
    .deleted-label {
      font-size: 12px;
      color: #94a3b8;
      font-style: italic;
    }

    .empty-state {
      padding: 48px;
      text-align: center;
      color: #94a3b8;
    }
    .empty-state p { font-size: 15px; }

    .loading {
      padding: 48px;
      text-align: center;
      color: #94a3b8;
    }

    @media (max-width: 768px) {
      .main-screen { padding: 16px; }
      .search-input { width: 140px; }
      th:nth-child(1), td:nth-child(1) { display: none; } /* hide thumbnail on mobile */
    }
  </style>
</head>
<body>

<div class="header">
  <a href="/admin/">← CMS</a>
  <h1>베타영상 관리</h1>
  <div class="header-spacer"></div>
  <button class="logout-btn" id="logoutBtn" style="display:none">로그아웃</button>
</div>

<!-- Setup screen (shown when not logged in) -->
<div class="setup-screen" id="setupScreen">
  <div class="setup-card">
    <h2>관리자 설정</h2>
    <p>베타영상 관리 API에 접근하려면 Worker URL을 입력하세요.<br>Decap CMS 로그인 세션이 자동으로 사용됩니다.</p>

    <div class="info-box" id="sessionInfo" style="display:none">
      ✅ Decap CMS 로그인 세션 감지됨 — 자동으로 인증됩니다.
    </div>
    <div class="info-box" style="background:#fff7ed; border-color:#fed7aa; color:#9a3412;" id="sessionWarn" style="display:none">
      ⚠️ Decap CMS 세션이 없습니다. 먼저 <a href="/admin/" style="color:#9a3412">/admin/</a>에서 로그인해 주세요.
    </div>

    <div class="form-group">
      <label>Worker API URL</label>
      <input type="url" id="workerUrlInput" placeholder="https://granite.xxx.workers.dev" />
    </div>

    <button class="btn-primary" id="connectBtn">연결</button>
    <div class="error-msg" id="setupError"></div>
  </div>
</div>

<!-- Main screen (shown when connected) -->
<div class="main-screen" id="mainScreen" style="display:none">
  <div class="top-bar">
    <h2>베타영상 목록</h2>
    <span class="badge" id="totalBadge">0개</span>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-platform="">전체</button>
    <button class="filter-btn" data-platform="instagram">📸 Instagram</button>
    <button class="filter-btn" data-platform="youtube">▶ YouTube</button>
    <button class="filter-btn" data-platform="tiktok">🎵 TikTok</button>
    <button class="filter-btn" data-platform="other">기타</button>
    <div class="filter-spacer"></div>
    <input class="search-input" type="text" id="problemSearch" placeholder="문제명 검색..." />
    <label class="toggle-deleted">
      <input type="checkbox" id="showDeleted" /> 삭제된 항목 포함
    </label>
  </div>

  <div class="table-wrapper">
    <div class="loading" id="loadingState">불러오는 중...</div>
    <div class="empty-state" id="emptyState" style="display:none">
      <p>등록된 베타영상이 없습니다.</p>
    </div>
    <table id="videosTable" style="display:none">
      <thead>
        <tr>
          <th class="thumbnail-cell">썸네일</th>
          <th>플랫폼</th>
          <th>URL</th>
          <th>문제 (Problem)</th>
          <th>등록일</th>
          <th>삭제</th>
        </tr>
      </thead>
      <tbody id="videosBody"></tbody>
    </table>
  </div>
</div>

<script>
  // ─── State ──────────────────────────────────────────────────────────────────
  let workerUrl = '';
  let authToken = '';
  let allVideos = [];
  let currentPlatform = '';
  let showDeleted = false;

  // ─── Helpers ────────────────────────────────────────────────────────────────
  function getDecapToken() {
    try {
      const raw = localStorage.getItem('gotrue.user');
      if (!raw) return null;
      const data = JSON.parse(raw);
      return data?.token?.access_token || null;
    } catch {
      return null;
    }
  }

  function formatDate(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    return d.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' })
      + ' ' + d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  }

  function truncateUrl(url, max = 50) {
    if (!url) return '';
    try {
      const u = new URL(url);
      const path = u.hostname + u.pathname;
      return path.length > max ? path.slice(0, max) + '…' : path;
    } catch {
      return url.length > max ? url.slice(0, max) + '…' : url;
    }
  }

  function platformBadge(platform) {
    const map = {
      instagram: ['📸', 'Instagram', 'platform-instagram'],
      youtube:   ['▶', 'YouTube',   'platform-youtube'],
      tiktok:    ['🎵', 'TikTok',   'platform-tiktok'],
      other:     ['🔗', '기타',      'platform-other'],
    };
    const [icon, label, cls] = map[platform] || map['other'];
    return `<span class="platform-badge ${cls}">${icon} ${label}</span>`;
  }

  // ─── Setup screen ────────────────────────────────────────────────────────────
  function initSetupScreen() {
    const token = getDecapToken();
    if (token) {
      document.getElementById('sessionInfo').style.display = 'block';
      document.getElementById('sessionWarn').style.display = 'none';
    } else {
      document.getElementById('sessionInfo').style.display = 'none';
      document.getElementById('sessionWarn').style.display = 'block';
    }

    const saved = localStorage.getItem('granite_worker_url');
    if (saved) document.getElementById('workerUrlInput').value = saved;
  }

  document.getElementById('connectBtn').addEventListener('click', async () => {
    const url = document.getElementById('workerUrlInput').value.trim().replace(/\/$/, '');
    const errEl = document.getElementById('setupError');
    errEl.textContent = '';

    if (!url) { errEl.textContent = 'Worker URL을 입력해 주세요.'; return; }

    const token = getDecapToken();
    if (!token) {
      errEl.textContent = '⚠️ Decap CMS 세션이 없습니다. /admin/ 에서 먼저 로그인하세요.';
      return;
    }

    const btn = document.getElementById('connectBtn');
    btn.disabled = true;
    btn.textContent = '연결 중...';

    try {
      const res = await fetch(`${url}/admin/beta-videos`, {
        headers: { Authorization: `Bearer ${token}` },
      });

      if (res.status === 401) {
        errEl.textContent = '인증 실패: Decap CMS 세션이 만료되었거나 유효하지 않습니다. /admin/ 에서 재로그인하세요.';
        return;
      }
      if (!res.ok) {
        errEl.textContent = `연결 실패: ${res.status} ${res.statusText}`;
        return;
      }

      localStorage.setItem('granite_worker_url', url);
      workerUrl = url;
      authToken = token;

      const data = await res.json();
      allVideos = data.videos || [];
      showMainScreen();
    } catch (e) {
      errEl.textContent = `연결 오류: ${e.message}`;
    } finally {
      btn.disabled = false;
      btn.textContent = '연결';
    }
  });

  // ─── Main screen ─────────────────────────────────────────────────────────────
  function showMainScreen() {
    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    document.getElementById('logoutBtn').style.display = 'block';
    renderTable();
  }

  async function loadVideos() {
    const params = new URLSearchParams();
    if (showDeleted) params.set('includeDeleted', '1');

    const res = await fetch(`${workerUrl}/admin/beta-videos?${params}`, {
      headers: { Authorization: `Bearer ${authToken}` },
    });

    if (res.status === 401) {
      alert('세션이 만료되었습니다. 다시 로그인해 주세요.');
      resetToSetup();
      return;
    }

    const data = await res.json();
    allVideos = data.videos || [];
    renderTable();
  }

  function renderTable() {
    const searchVal = document.getElementById('problemSearch').value.toLowerCase();
    let filtered = allVideos.filter(v => {
      if (currentPlatform && v.platform !== currentPlatform) return false;
      if (!showDeleted && v.deletedAt) return false;
      if (searchVal && !v.problemSlug.toLowerCase().includes(searchVal)) return false;
      return true;
    });

    document.getElementById('totalBadge').textContent = `${filtered.length}개`;
    document.getElementById('loadingState').style.display = 'none';

    if (filtered.length === 0) {
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('videosTable').style.display = 'none';
      return;
    }

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('videosTable').style.display = 'table';

    const tbody = document.getElementById('videosBody');
    tbody.innerHTML = filtered.map(v => `
      <tr class="${v.deletedAt ? 'deleted' : ''}" data-id="${v.id}">
        <td class="thumbnail-cell">
          ${v.thumbnailUrl
            ? `<img class="thumbnail" src="${v.thumbnailUrl}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=thumbnail-placeholder>🎬</div>'" />`
            : `<div class="thumbnail-placeholder">${platformIcon(v.platform)}</div>`
          }
        </td>
        <td>${platformBadge(v.platform)}</td>
        <td>
          <a class="video-link" href="${v.videoUrl}" target="_blank" rel="noopener noreferrer" title="${v.videoUrl}">
            ${truncateUrl(v.videoUrl)}
          </a>
        </td>
        <td><span class="problem-slug">${v.problemSlug}</span></td>
        <td class="date-cell">${formatDate(v.submittedAt)}</td>
        <td>
          ${v.deletedAt
            ? `<span class="deleted-label">삭제됨<br>${formatDate(v.deletedAt)}</span>`
            : `<button class="delete-btn" onclick="deleteVideo(${v.id})">🗑 삭제</button>`
          }
        </td>
      </tr>
    `).join('');
  }

  function platformIcon(platform) {
    return { instagram: '📸', youtube: '▶', tiktok: '🎵', other: '🔗' }[platform] || '🔗';
  }

  async function deleteVideo(id) {
    const video = allVideos.find(v => v.id === id);
    if (!video) return;

    const confirmed = confirm(`이 베타영상을 삭제하시겠습니까?\n\n문제: ${video.problemSlug}\nURL: ${video.videoUrl}`);
    if (!confirmed) return;

    try {
      const res = await fetch(`${workerUrl}/admin/beta-videos/${id}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${authToken}` },
      });

      if (res.status === 401) {
        alert('세션이 만료되었습니다. 다시 로그인해 주세요.');
        resetToSetup();
        return;
      }
      if (!res.ok) {
        const data = await res.json();
        alert(`삭제 실패: ${data.error || res.statusText}`);
        return;
      }

      // Update local state (soft delete)
      const v = allVideos.find(v => v.id === id);
      if (v) v.deletedAt = new Date().toISOString();
      renderTable();
    } catch (e) {
      alert(`삭제 오류: ${e.message}`);
    }
  }

  // ─── Event listeners ─────────────────────────────────────────────────────────
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPlatform = btn.dataset.platform;
      renderTable();
    });
  });

  document.getElementById('problemSearch').addEventListener('input', renderTable);

  document.getElementById('showDeleted').addEventListener('change', async (e) => {
    showDeleted = e.target.checked;
    await loadVideos();
  });

  document.getElementById('logoutBtn').addEventListener('click', resetToSetup);

  function resetToSetup() {
    localStorage.removeItem('granite_worker_url');
    workerUrl = '';
    authToken = '';
    allVideos = [];
    document.getElementById('mainScreen').style.display = 'none';
    document.getElementById('setupScreen').style.display = 'flex';
    document.getElementById('logoutBtn').style.display = 'none';
    document.getElementById('setupError').textContent = '';
    initSetupScreen();
  }

  // ─── Init ────────────────────────────────────────────────────────────────────
  initSetupScreen();

  // Auto-connect if Worker URL is saved and token is available
  const savedUrl = localStorage.getItem('granite_worker_url');
  const savedToken = getDecapToken();
  if (savedUrl && savedToken) {
    workerUrl = savedUrl;
    authToken = savedToken;
    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    document.getElementById('logoutBtn').style.display = 'block';
    loadVideos();
  }
</script>
</body>
</html>
